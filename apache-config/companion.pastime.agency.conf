<VirtualHost *:80>
    ServerName companion.pastime.agency

    # Redirect all HTTP to HTTPS (required for microphone access)
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName companion.pastime.agency

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/companion.pastime.agency/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/companion.pastime.agency/privkey.pem

    # Optional: SSL security improvements
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5

    # Enable proxy modules
    ProxyPreserveHost On
    ProxyRequests Off

    # Proxy to Node.js application
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    # WebSocket proxy support (required for real-time audio)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)           ws://localhost:3000/$1 [P,L]
    RewriteCond %{HTTP:Upgrade} !=websocket [NC]
    RewriteRule /(.*)           http://localhost:3000/$1 [P,L]

    # Optional: Logging
    ErrorLog ${APACHE_LOG_DIR}/companion-error.log
    CustomLog ${APACHE_LOG_DIR}/companion-access.log combined

    # Optional: Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
</VirtualHost>
