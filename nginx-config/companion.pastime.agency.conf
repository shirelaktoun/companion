# Nginx configuration for companion.pastime.agency
# Listening on port 8080 (since Apache uses port 80)

# Redirect HTTP to HTTPS
server {
    listen 8080;
    server_name companion.pastime.agency;

    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 8443 ssl http2;
    server_name companion.pastime.agency;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/companion.pastime.agency/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/companion.pastime.agency/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy to Node.js application
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-lived connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Logging
    access_log /var/log/nginx/companion-access.log;
    error_log /var/log/nginx/companion-error.log;
}
