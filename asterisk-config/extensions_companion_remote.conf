; AI Companion Extension Configuration - REMOTE SERVER SETUP
; Extension 7000 - Dial to reach AI Assistant
;
; This configuration is for when Asterisk and the AI application
; are running on DIFFERENT servers:
; - Asterisk Server: 87.106.72.7
; - Application Server: 87.106.143.109
;
; Installation:
; 1. Make sure app_audiosocket is loaded: asterisk -rx "module load app_audiosocket.so"
; 2. Copy this file to /etc/asterisk/extensions_companion.conf on Asterisk server (87.106.72.7)
; 3. Include it in extensions.conf: #include extensions_companion.conf
; 4. Make sure port 4000 is open on application server (87.106.143.109)
; 5. Reload dialplan: asterisk -rx "dialplan reload"

[from-internal-custom]
; Extension 7000 - AI Companion (Remote Server)
; AudioSocket will use whatever codec the call is already using
exten => 7000,1,NoOp(Incoming call to AI Companion on 87.106.143.109)
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,AudioSocket(40325ec4-1f0b-4d38-8c5d-23f9a71e7c75,87.106.143.109:4000)
 same => n,Hangup()

; Note: The UUID (40325ec4-...) is a unique identifier for this call route
; The AudioSocket server is running on 87.106.143.109:4000
