; AI Companion Extension Configuration
; Extension 7000 - Dial to reach AI Assistant
;
; Installation:
; 1. Make sure app_audiosocket is loaded: asterisk -rx "module load app_audiosocket.so"
; 2. Copy this file to /etc/asterisk/extensions_companion.conf
; 3. Include it in extensions.conf: #include extensions_companion.conf
; 4. Reload dialplan: asterisk -rx "dialplan reload"

[from-internal-custom]
; Extension 7000 - AI Companion
exten => 7000,1,NoOp(Incoming call to AI Companion)
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,AudioSocket(40325ec4-1f0b-4d38-8c5d-23f9a71e7c75,127.0.0.1:9999)
 same => n,Hangup()

; Note: The UUID (40325ec4-...) is a unique identifier for this call route
; The AudioSocket server is listening on 127.0.0.1:9999
