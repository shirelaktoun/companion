; AI Companion Extension Configuration
; Extension 7000 - Dial to reach AI Assistant
;
; Installation:
; 1. Copy this file to /etc/asterisk/extensions_companion.conf
; 2. Include it in extensions.conf: #include extensions_companion.conf
; 3. Reload dialplan: asterisk -rx "dialplan reload"

[from-internal-custom]
; Extension 7000 - AI Companion
exten => 7000,1,NoOp(Incoming call to AI Companion)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(silence/1)
 same => n,AGI(agi://localhost:4000/ai-companion)
 same => n,Hangup()

; Alternative: Using Stasis/ARI for more control
;exten => 7000,1,NoOp(Incoming call to AI Companion - ARI)
; same => n,Answer()
; same => n,Stasis(ai-companion)
; same => n,Hangup()
